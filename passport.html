<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <title>Паспорт - Wiigos</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow: auto;
            background-color: #ffffff;
            -webkit-overflow-scrolling: touch;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 0;
            touch-action: pan-y;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        map area {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="imgs/passp.png" alt="Паспорт" usemap="#passp-map">
        <map name="passp-map">
            <area shape="rect" coords="0,0,1170,2438" href="index.html" alt="Назад">
        </map>
    </div>

    <script>
        // Responsive image map resizer
        (function() {
            function resizeMap() {
                const img = document.querySelector('img[usemap]');
                const map = document.querySelector('map[name="passp-map"]');
                if (!img || !map) return;

                const areas = map.querySelectorAll('area');
                const imgWidth = img.naturalWidth;
                const imgHeight = img.naturalHeight;
                const displayWidth = img.offsetWidth;
                const displayHeight = img.offsetHeight;

                const scaleX = displayWidth / imgWidth;
                const scaleY = displayHeight / imgHeight;

                areas.forEach(area => {
                    const originalCoords = area.dataset.coords || area.getAttribute('coords');
                    if (!area.dataset.coords) {
                        area.dataset.coords = originalCoords;
                    }

                    const coords = originalCoords.split(',').map(Number);
                    const scaledCoords = coords.map((coord, i) => {
                        return Math.round(coord * (i % 2 === 0 ? scaleX : scaleY));
                    });

                    area.setAttribute('coords', scaledCoords.join(','));
                });
            }

            window.addEventListener('load', resizeMap);
            window.addEventListener('resize', resizeMap);
        })();
    </script>
</body>
</html>
